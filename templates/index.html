<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tre Borden /Co — Lead Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 48px;
            max-width: 680px;
            width: 100%;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 15px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            color: #1a1a1a;
            background: white;
            appearance: none;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: #1a1a1a;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #333;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        #status {
            margin-top: 32px;
            display: none;
        }

        .status-header {
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
            margin-bottom: 12px;
        }

        #log {
            background: #f5f5f0;
            border-radius: 8px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.8;
            color: #333;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-line {
            padding: 2px 0;
        }

        .log-line.highlight {
            color: #1a1a1a;
            font-weight: 500;
        }

        #results {
            margin-top: 32px;
            display: none;
        }

        .results-header {
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
            margin-bottom: 16px;
        }

        .section-divider {
            margin-top: 32px;
            margin-bottom: 16px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
        }

        .lead-card {
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .lead-card.new-lead {
            border-color: #1a1a1a;
        }

        .lead-card.previous-lead {
            opacity: 0.7;
        }

        .lead-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .lead-meta {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }

        .lead-why {
            font-size: 13px;
            color: #333;
            line-height: 1.5;
        }

        .new-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            background: #1a1a1a;
            color: white;
            margin-left: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .icp-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }

        .icp-high {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .icp-mid {
            background: #fff8e1;
            color: #f57f17;
        }

        .icp-low {
            background: #fce4ec;
            color: #c62828;
        }

        .download-btn {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 24px;
            background: white;
            color: #1a1a1a;
            border: 1.5px solid #1a1a1a;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.2s;
            width: 100%;
            text-align: center;
        }

        .download-btn:hover {
            background: #f5f5f0;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #ffffff40;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Tre Borden /Co — Lead Finder</h1>
            <p>Search for potential art commission leads in Los Angeles and surrounding areas.</p>
        </div>

        <div class="form-group">
            <label>Market Segment</label>
            <select id="segment">
                <option value="corporate">Corporate</option>
                <option value="public_sector">Public Sector</option>
            </select>
        </div>

        <button id="runBtn" onclick="runAgent()">Find Leads</button>

        <div id="status">
            <div class="status-header">Status</div>
            <div id="log"></div>
        </div>

        <div id="results">
            <div id="newLeadsSection">
                <div class="results-header">New Leads</div>
                <div id="newLeadCards"></div>
            </div>
            <div id="previousLeadsSection" style="display: none;">
                <div class="section-divider">
                    <div class="results-header">Previous Leads</div>
                </div>
                <div id="previousLeadCards"></div>
            </div>
            <a href="/download" class="download-btn">Download Spreadsheet</a>
        </div>
    </div>

    <script>
        function renderLeadCard(lead, isNew) {
            const score = lead.icp_score || 0;
            const badgeClass = score >= 8 ? "icp-high" : score >= 6 ? "icp-mid" : "icp-low";
            const cardClass = isNew ? "lead-card new-lead" : "lead-card previous-lead";
            const newBadge = isNew ? '<span class="new-badge">New</span>' : "";
            const dateLine = lead.date_found ? `<span style="margin-left: 8px; font-size: 12px; color: #999;">Found ${lead.date_found}</span>` : "";

            return `
                <div class="${cardClass}">
                    <div class="lead-name">
                        ${lead.company_name}
                        <span class="icp-badge ${badgeClass}">ICP ${score}</span>
                        ${newBadge}
                    </div>
                    <div class="lead-meta">${lead.type} — ${lead.location}${dateLine}</div>
                    <div class="lead-why">${lead.why_a_lead}</div>
                </div>
            `;
        }

        function runAgent() {
            const segment = document.getElementById("segment").value;
            const btn = document.getElementById("runBtn");
            const status = document.getElementById("status");
            const log = document.getElementById("log");
            const results = document.getElementById("results");
            const newLeadCards = document.getElementById("newLeadCards");
            const previousLeadsSection = document.getElementById("previousLeadsSection");
            const previousLeadCards = document.getElementById("previousLeadCards");

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Running...';
            status.style.display = "block";
            results.style.display = "none";
            log.innerHTML = "";
            newLeadCards.innerHTML = "";
            previousLeadCards.innerHTML = "";
            previousLeadsSection.style.display = "none";

            // Capture company names that existed before this run
            let previousNames = new Set();
            fetch("/leads?" + new URLSearchParams({segment}).toString())
                .then(r => r.json())
                .then(existing => {
                    existing.forEach(l => previousNames.add(l.company_name.toLowerCase()));
                })
                .catch(() => {});

            const eventSource = new EventSource("/run?" + new URLSearchParams({segment}).toString());

            eventSource.onmessage = function(e) {
                const data = e.data;

                if (data.startsWith("DONE|")) {
                    eventSource.close();
                    btn.disabled = false;
                    btn.innerHTML = "Find Leads";

                    try {
                        const newLeads = JSON.parse(data.slice(5));

                        // Show new leads
                        if (newLeads && newLeads.length > 0) {
                            results.style.display = "block";
                            newLeads.forEach(lead => {
                                newLeadCards.innerHTML += renderLeadCard(lead, true);
                            });
                        }

                        // Fetch all leads and show previous ones below
                        fetch("/leads?" + new URLSearchParams({segment}).toString())
                            .then(r => r.json())
                            .then(allLeads => {
                                const previous = allLeads.filter(l =>
                                    !previousNames.has("__empty__") &&
                                    previousNames.has(l.company_name.toLowerCase())
                                );
                                if (previous.length > 0) {
                                    results.style.display = "block";
                                    previousLeadsSection.style.display = "block";
                                    previous.forEach(lead => {
                                        previousLeadCards.innerHTML += renderLeadCard(lead, false);
                                    });
                                }
                            })
                            .catch(() => {});

                    } catch(err) {
                        console.error("Could not parse leads", err);
                    }
                    return;
                }

                const line = document.createElement("div");
                line.className = "log-line" + (data.includes("Saved") ? " highlight" : "");
                line.textContent = data;
                log.appendChild(line);
                log.scrollTop = log.scrollHeight;
            };

            eventSource.onerror = function() {
                eventSource.close();
                btn.disabled = false;
                btn.innerHTML = "Find Leads";
                const line = document.createElement("div");
                line.className = "log-line";
                line.textContent = "Connection error. Please try again.";
                log.appendChild(line);
            };
        }
    </script>
</body>
</html>
